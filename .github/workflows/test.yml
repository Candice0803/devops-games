name: CI-CD

on:
  push:
    branches: [ "main", "feature/keep-white-space" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: js-game-keep-white-space

      - name: Run tests
        run: npm test || true
        working-directory: js-game-keep-white-space

      - name: Audit
        run: npm audit || true
        working-directory: js-game-keep-white-space

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./js-game-keep-white-space