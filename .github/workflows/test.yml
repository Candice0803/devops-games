name: CI-CD

on:
  push:
    branches: [ "main", "feature/keep-white-space" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: js-game-keep-white-space
        run: npm install

      # -------------------------
      # LINT (Google style approx via eslint)
      # -------------------------
      - name: Install ESLint
        working-directory: js-game-keep-white-space
        run: npm install eslint --save-dev

      - name: Run Linter
        working-directory: js-game-keep-white-space
        run: npx eslint . || true

      # -------------------------
      # TESTS
      # -------------------------
      - name: Run tests
        working-directory: js-game-keep-white-space
        run: npm test || true

      # -------------------------
      # AUDIT SECURITE
      # -------------------------
      - name: Audit dependencies
        working-directory: js-game-keep-white-space
        run: npm audit || true

      # -------------------------
      # DOCKER BUILD
      # -------------------------
      - name: Build Docker image
        run: docker build -t mon-jeu -f js-game-keep-white-space/Dockerfile js-game-keep-white-space

      - name: Run container
        run: docker run -d -p 8080:80 --name test-container mon-jeu

      - name: Wait
        run: sleep 5

      - name: Test HTTP
        run: curl -f http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop test-container

  # -------------------------
  # DEPLOIEMENT GITHUB PAGES
  # -------------------------
  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./js-game-keep-white-space