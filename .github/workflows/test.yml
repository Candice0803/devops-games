name: test jeu keep-white-space

on:
push:
branches: [ "dev", "main", "feature/*" ]
pull_request:
branches: [ "dev", "main" ]

jobs:
build-and-test:
runs-on: ubuntu-latest

steps:
# 1. Récupérer le code
- name: Checkout repository
uses: actions/checkout@v3

# 2. Installer Node.js
- name: Setup Node.js
uses: actions/setup-node@v3
with:
node-version: '18'

# 3. Installer les dépendances
- name: Install dependencies
run: npm install

# 4. Lancer les tests
- name: Run tests
run: npm test

# 5. Audit de sécurité
- name: Security audit
run: npm audit --audit-level=high

# 6. Build Docker
- name: Build Docker image
run: docker build -t mon-jeu .

# 7. "Déploiement" (simulation simple)
- name: Deploy application
run: echo "Jeu qui marche parfaitement 🚀"
