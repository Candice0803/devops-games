name: CI/CD jeu

on:
  push:
    branches: [ "feature/keep-white-space" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: js-game-keep-white-space

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t mon-jeu .

      - name: Test container
        run: |
          docker run -d -p 8080:80 --name test-container mon-jeu
          sleep 5
          curl -f http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop test-container