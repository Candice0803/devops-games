name: CI/CD jeu

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Vérifier la structure 
      - name: Debug structure
        run: ls -R

      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 4. Installer les dépendances
      - name: Install deps
        run: |
          cd devops-games/js-game-keep-white-space
          npm ci

      # 5. Lint 
      - name: Lint
        run: |
          cd devops-games/js-game-keep-white-space
          npm run lint || echo "Pas de lint configuré"

      # 6. Tests
      - name: Run tests
        run: |
          cd devops-games/js-game-keep-white-space
          npm test

      # 7. Audit sécurité
      - name: Audit sécurité
        run: |
          cd devops-games/js-game-keep-white-space
          npm audit --audit-level=high

      # 8. Build Docker
      - name: Build Docker image
        run: |
          cd devops-games/js-game-keep-white-space
          docker build -t mon-jeu .

      # 9. Tester le container
      - name: Test container
        run: |
          cd devops-games/js-game-keep-white-space
          docker run -d -p 8080:80 --name test-container mon-jeu
          sleep 5
          curl -f http://localhost:8080

      # 10. Stop container
      - name: Stop container
        if: always()
        run: docker stop test-container || true

      # 11. Validation déploiement
      - name: Deploy
        run: echo "Application prête et testée, déploiement validé"
