name: CI 

on:
  push:
    branches: [ "feature/keep-white-space" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mon-jeu ./js-game-keep-white-space

      - name: Run container
        run: docker run -d -p 8080:80 --name test-container mon-jeu

      - name: Wait
        run: sleep 5

      - name: Test HTTP
        run: curl -f http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop test-container