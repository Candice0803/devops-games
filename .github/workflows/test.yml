name: CI

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug structure 
        run: ls -R

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Go into project + install
        run: |
          cd devops-games/js-game-keep-white-space
          npm install

      - name: Run tests (non bloquant)
        run: |
          cd devops-games/js-game-keep-white-space
          npm test || true