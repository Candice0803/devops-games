name: CI-CD

on:
  push:
    branches: [ "main", "feature/keep-white-space" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./js-game-keep-white-space

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: ls -R $GITHUB_WORKSPACE

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || true

      - name: Audit
        run: npm audit || true

      - name: Build Docker image
        working-directory: .
        run: docker build -t mon-jeu .

      - name: Run container
        working-directory: .
        run: docker run -d -p 8080:80 --name test-container mon-jeu

      - name: Wait
        run: sleep 5

      - name: Test HTTP
        run: curl -f http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop test-container || true

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./js-game-keep-white-space