name: CI-CD

on:
  push:
    branches: [ "main", "feature/keep-white-space" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # DEBUG (tu peux enlever après)
      - name: Debug files
        run: ls -R

      # -------------------------
      # NODE SETUP
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -------------------------
      # INSTALL + TEST
      # -------------------------
      - name: Install dependencies
        run: |
          cd js-game-keep-white-space
          npm install

      - name: Run tests
        run: |
          cd js-game-keep-white-space
          npm test || true

      - name: Audit
        run: |
          cd js-game-keep-white-space
          npm audit || true

      # -------------------------
      # DOCKER
      # -------------------------
      - name: Build Docker image
        run: docker build -t mon-jeu ./js-game-keep-white-space

      - name: Run container
        run: docker run -d -p 8080:80 --name test-container mon-jeu

      - name: Wait
        run: sleep 5

      - name: Test HTTP
        run: curl -f http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop test-container || true

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./js-game-keep-white-space