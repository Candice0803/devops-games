name: CI/CD jeu

on:
  push:
    branches: [ "main", "dev", "feature/**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: |
          cd js-game-keep-white-space
          if [ -f package.json ]; then npm ci; else echo "no package.json"; fi

      - name: Run tests
        run: |
          cd js-game-keep-white-space
          if npm run | grep -q test; then npm test; else echo "no tests"; fi

      - name: Audit
        run: |
          cd js-game-keep-white-space
          npm audit --audit-level=high || true

      - name: Build Docker
        run: |
          cd js-game-keep-white-space
          docker build -t mon-jeu .

      - name: Test container
        run: |
          cd js-game-keep-white-space
          docker run -d -p 8080:80 --name test-container mon-jeu
          sleep 5
          curl -f http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop test-container || true