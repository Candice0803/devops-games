name: CI/CD jeu

on:
  push:
    branches: [ "main", "dev", "feature/*" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm install

      - name: Run tests
        run: npm test

      - name: Audit
        run: npm audit --audit-level=high

      - name: Build Docker image
        run: docker build -t mon-jeu ./js-game-keep-white-space

      - name: Run container test
        run: |
          docker run -d -p 8080:80 --name test-container mon-jeu
          sleep 5
          curl -f http://localhost:8080 || exit 1

      - name: Stop container
        run: docker stop test-container

      - name: Deploy
        run: echo "Application prête et testée - déploiement validé"
