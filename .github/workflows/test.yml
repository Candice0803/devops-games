name: test

on:
  push:
    branches:
      - dev
      - main
      - feature/*
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      - name: Audit
        run: npm audit --audit-level=high

      - name: Docker build
        run: docker build -t mon-jeu .

      - name: Deploy
        run: echo "OK"
