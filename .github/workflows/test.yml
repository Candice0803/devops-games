name: CI-CD

on:
  push:
    branches: [ "**" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo content
        run: |
          echo "ROOT:"
          ls -la
          echo "GAME:"
          ls -la js-game-keep-white-space || echo "NOT FOUND"

      - name: Find package.json
        run: |
          find . -name package.json

      - name: Install (SAFE)
        run: |
          cd js-game-keep-white-space || exit 1
          ls -la
          npm install