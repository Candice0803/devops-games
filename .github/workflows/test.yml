name: CI-CD

on:
  push:
    branches: [ "main", "feature/keep-white-space" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT PROPRE
      # -------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # DEBUG 
      # -------------------------
      - name: Debug structure
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== GAME FOLDER ==="
          ls -la js-game-keep-white-space || echo "FOLDER NOT FOUND"

      # -------------------------
      # NODE
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -------------------------
      # INSTALL
      # -------------------------
      - name: Install dependencies
        run: npm install
        working-directory: js-game-keep-white-space

      # -------------------------
      # TESTS
      # -------------------------
      - name: Run tests
        run: npm test || true
        working-directory: js-game-keep-white-space

      # -------------------------
      # AUDIT
      # -------------------------
      - name: Audit
        run: npm audit || true
        working-directory: js-game-keep-white-space

      # -------------------------
      # DOCKER
      # -------------------------
      - name: Build Docker image
        run: docker build -t mon-jeu js-game-keep-white-space

      - name: Run container
        run: docker run -d -p 8080:80 --name test-container mon-jeu

      - name: Wait
        run: sleep 5

      - name: Test HTTP
        run: curl -f http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop test-container || true

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./js-game-keep-white-space