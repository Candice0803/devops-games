name: CI

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
        working-directory: devops-games/js-game-keep-white-space

      - run: npm test || true
        working-directory: devops-games/js-game-keep-white-space